<!DOCTYPE html>
<html>
<head>
  <title>Test Chat</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
  <h2>Test Chat Socket.io</h2>

  <label>User ID :</label>
  <input id="userId" placeholder="ton user id" />
  <button onclick="connect()">Se connecter</button>
  <p id="status">Déconnecté</p>

  <hr />

  <label>Receiver ID :</label>
  <input id="receiverId" placeholder="id du destinataire" />
  <br /><br />
  <label>Message :</label>
  <input id="message" placeholder="ton message" />
  <button onclick="send()">Envoyer</button>

  <h3>Messages reçus :</h3>
  <ul id="messages"></ul>

  <h3>Utilisateurs en ligne :</h3>
  <ul id="online"></ul>

  <script>
    let socket;

    function connect() {
      const userId = document.getElementById('userId').value;
      socket = io('http://localhost:3000', { query: { userId } });

      socket.on('connect', () => {
        document.getElementById('status').textContent = 'Connecté (' + userId + ')';
      });

      socket.on('newMessage', (msg) => {
        const li = document.createElement('li');
        li.textContent = msg.senderId + ' : ' + msg.content;
        document.getElementById('messages').appendChild(li);
      });

      socket.on('userOnline', (id) => {
        const li = document.createElement('li');
        li.textContent = id + ' est en ligne';
        document.getElementById('online').appendChild(li);
      });

      socket.on('userOffline', (id) => {
        const li = document.createElement('li');
        li.textContent = id + ' est hors ligne';
        document.getElementById('online').appendChild(li);
      });
    }

    function send() {
      const senderId = document.getElementById('userId').value;
      const receiverId = document.getElementById('receiverId').value;
      const content = document.getElementById('message').value;

      socket.emit('sendMessage', { senderId, receiverId, content }, (response) => {
        const li = document.createElement('li');
        li.textContent = 'Moi : ' + content;
        document.getElementById('messages').appendChild(li);
        document.getElementById('message').value = '';
      });
    }
  </script>
</body>
</html>
